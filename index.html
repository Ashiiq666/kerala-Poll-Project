<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കേരള പൾസ് | മുഖ്യമന്ത്രി തെരഞ്ഞെടുപ്പ് 2026</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="അടുത്ത കേരള മുഖ്യമന്ത്രി ആരാകണം? നിങ്ങളുടെ വോട്ട് രേഖപ്പെടുത്തൂ. ജനം പറയട്ടെ!">
    
    <!-- Google Fonts: Outfit for modern UI & Manjari for Malayalam -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Manjari:wght@400;700&display=swap" rel="stylesheet">

    <!-- Gun.js for Real-time Global Sync -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #dbeafe;
            --bg: #f8fafc;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 1.5rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Manjari', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-box {
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--primary);
            font-family: 'Manjari', sans-serif;
        }

        .live-tag {
            display: inline-flex;
            align-items: center;
            background: #fdf2f2;
            color: #ef4444;
            padding: 0.35rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Manjari', sans-serif;
            margin-top: 0.5rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hero {
            padding: 4rem 1rem 3rem;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.25rem;
            color: var(--primary);
            font-family: 'Manjari', sans-serif;
        }

        h1 mark {
            background: var(--accent);
            color: var(--primary);
            padding: 0 0.5rem;
            border-radius: 0.5rem;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-light);
            font-family: 'Manjari', sans-serif;
            max-width: 600px;
            margin: 0 auto;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 6rem;
        }

        .poll-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .poll-list.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .card:hover {
            border-color: var(--secondary);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 86, 179, 0.1);
        }

        .profile-img-wrap {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 6px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: var(--accent);
        }

        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-family: 'Manjari', sans-serif;
        }

        .details p {
            font-size: 1rem;
            color: var(--text-light);
            font-family: 'Manjari', sans-serif;
            margin-bottom: 2rem;
            min-height: 3em;
        }

        .btn-vote {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.15rem;
            cursor: pointer;
            font-family: 'Manjari', sans-serif;
            transition: var(--transition);
        }

        .btn-vote:hover { background: var(--secondary); }

        .results-box {
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: 2rem;
            padding: 3rem;
            max-width: 700px;
            margin: 0 auto;
            display: none;
            box-shadow: 0 25px 50px rgba(30, 58, 138, 0.1);
        }

        .results-box.active { display: block; }
        .result-row { margin-bottom: 2.5rem; }
        .res-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .res-name { font-weight: 700; font-size: 1.3rem; font-family: 'Manjari', sans-serif; }
        .res-count { font-size: 0.95rem; color: var(--text-light); font-weight: 600; font-family: 'Manjari', sans-serif; }
        .res-percent { font-weight: 800; font-size: 1.75rem; color: var(--primary); }
        .bar-container { height: 1.25rem; background: var(--accent); border-radius: 1rem; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0; transition: width 1s ease-out; }

        footer { text-align: center; padding: 5rem 1rem; background: white; border-top: 1px solid var(--border); margin-top: 4rem; }
        .copy { font-weight: 800; color: var(--primary); font-size: 1.25rem; font-family: 'Manjari', sans-serif; }

        @media (max-width: 600px) {
            h1 { font-size: 2.4rem; }
            .profile-img-wrap { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">കേരള പൾസ്</div>
        <div class="live-tag"><span class="live-dot"></span> തത്സമയ വിവരങ്ങൾ</div>
    </header>

    <main>
        <section class="hero" id="hero">
            <h1>അടുത്ത മുഖ്യമന്ത്രി <br><mark>ജനം പറയട്ടെ!</mark></h1>
            <p class="subtitle">നിങ്ങളുടെ വോട്ട് രേഖപ്പെടുത്തൂ. ഈ ഫലങ്ങൾ ലോകമെമ്പാടും തത്സമയം കാണാൻ സാധിക്കും.</p>
        </section>

        <div id="status-msg" style="text-align:center; padding:5rem; font-family:'Manjari'; display:none;">പരിശോധിക്കുന്നു...</div>

        <div class="main-container">
            <div id="poll-list" class="poll-list"></div>
            <div id="results-box" class="results-box">
                <h2 style="text-align: center; margin-bottom: 2.5rem; font-family: 'Manjari', sans-serif; color: var(--primary);">ഇതുവരെയുള്ള വോട്ട് നില</h2>
                <div id="results-render"></div>
                <p id="voted-note" style="text-align: center; margin-top: 2.5rem; font-weight: 700; color: var(--primary); font-family: 'Manjari', sans-serif;"></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="copy">യു.ഡി.എഫ് 2026 | കേരള പൾസ്</div>
    </footer>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gun-amsterdam.herokuapp.com/gun']);
        const voteStream = gun.get('kerala_poll_LIVE_STREAM_v10'); // FRESH KEY FOR FIXED PHOTOS

        const candidates = [
            { id: 'vds', name: 'വി.ഡി. സതീശൻ', desc: 'പ്രതിപക്ഷ നേതാവ്, കേരള നിയമസഭ.', img: 'https://upload.wikimedia.org/wikipedia/commons/e/ec/Vdsatheesan.jpg' },
            { id: 'kcv', name: 'കെ.സി. വേണുഗോപാൽ', desc: 'എ.ഐ.സി.സി. ജനറൽ സെക്രട്ടറി.', img: 'https://upload.wikimedia.org/wikipedia/commons/0/01/K.C._Venugopal.JPG' },
            { id: 'rc', name: 'രമേശ് ചെന്നിത്തല', desc: 'മുൻ ആഭ്യന്തര മന്ത്രി.', img: 'https://upload.wikimedia.org/wikipedia/commons/8/8b/Ramesh_chennithala_Feb26.jpg' }
        ];

        const pollList = document.getElementById('poll-list');
        const resultsBox = document.getElementById('results-box');
        const resultsRender = document.getElementById('results-render');
        const statusMsg = document.getElementById('status-msg');
        const hero = document.getElementById('hero');

        let counts = {};
        candidates.forEach(c => counts[c.id] = 0);

        voteStream.map().on((data) => {
            if (data && data.candidate) {
                counts[data.candidate] = (counts[data.candidate] || 0) + 1;
                if (resultsBox.classList.contains('active') || localStorage.getItem('kp_voted_official_live')) renderResults();
            }
        });

        async function init() {
            if (localStorage.getItem('kp_voted_official_live')) {
                showResultsUI();
            } else {
                statusMsg.style.display = 'block';
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    if (data.region !== 'Kerala' && data.region_code !== 'KL') {
                        statusMsg.innerText = 'കേരളത്തിലുള്ളവർക്ക് മാത്രമാണ് വോട്ട് ചെയ്യാൻ സാധിക്കുക.';
                        return;
                    }
                } catch (e) {}
                statusMsg.style.display = 'none';
                renderPoll();
            }
        }

        function renderPoll() {
            pollList.innerHTML = candidates.map(c => `
                <div class="card">
                    <div class="profile-img-wrap"><img src="${c.img}" alt="${c.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=1e3a8a&color=fff&size=256'"></div>
                    <div class="details"><h3>${c.name}</h3><p>${c.desc}</p></div>
                    <button class="btn-vote" onclick="cast('${c.id}')">വോട്ട് ചെയ്യുക</button>
                </div>
            `).join('');
            setTimeout(() => pollList.classList.add('visible'), 50);
        }

        function cast(id) {
            localStorage.setItem('kp_voted_official_live', 'true');
            voteStream.set({ candidate: id, t: Date.now(), u: Math.random().toString(36).substr(2, 5) });
            showResultsUI(true);
        }

        function showResultsUI(fresh = false) {
            hero.style.display = 'none';
            pollList.style.display = 'none';
            resultsBox.classList.add('active');
            document.getElementById('voted-note').innerText = fresh ? 'വോട്ട് ചെയ്തതിന് നന്ദി!' : 'നിങ്ങൾ നേരത്തെ വോട്ട് ചെയ്തിട്ടുണ്ട്.';
            renderResults();
        }

        function renderResults() {
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            const sorted = [...candidates].sort((a, b) => counts[b.id] - counts[a.id]);
            resultsRender.innerHTML = sorted.map(c => {
                const pct = total > 0 ? ((counts[c.id] / total) * 100).toFixed(1) : 0;
                return `
                    <div class="result-row">
                        <div class="res-top">
                            <span class="res-name">${c.name}</span>
                            <div style="text-align:right"><span class="res-percent">${pct}%</span><div class="res-count">${counts[c.id].toLocaleString()} വോട്ടുകൾ</div></div>
                        </div>
                        <div class="bar-container"><div class="bar-fill" style="width:${pct}%"></div></div>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
